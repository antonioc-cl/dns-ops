# Railway deployment configuration for web app
# Uses railway.app.config.ts which targets node-server preset

[build]
# Build using the Railway-specific config (node-server preset)
buildCommand = "bun install --frozen-lockfile && bunx vinxi build --config railway.app.config.ts"

[deploy]
# Node-server preset outputs to .output/server/index.mjs
startCommand = "node apps/web/.output/server/index.mjs"
healthcheckPath = "/api/health"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
