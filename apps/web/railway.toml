# Railway deployment for web service
# Uses Dockerfile for proper monorepo workspace support

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile.railway"

[deploy]
startCommand = "node apps/web/.output/server/index.mjs"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
