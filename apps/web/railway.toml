# Railway deployment configuration for web app
[build]
buildCommand = "bun install --frozen-lockfile && bun run build --filter=@dns-ops/web"

[deploy]
startCommand = "node apps/web/dist/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
