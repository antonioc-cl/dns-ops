# Railway deployment configuration for DNS Ops monorepo
# Web service uses Railpack (auto-detects start command from package.json)
# dns-ops service uses Dockerfile (CMD is defined in Dockerfile.railway)

[build]
buildCommand = "bun install && bun run build --filter=@dns-ops/web"

[deploy]
# No startCommand — let each builder use its own default:
#   Railpack (web) → auto-detects from package.json / build output
#   Dockerfile (dns-ops) → uses CMD from Dockerfile.railway
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
# cache-bust: 1777856536
