# Railway deployment configuration for DNS Ops monorepo

[build]
buildCommand = "bun install && bun run build --filter=@dns-ops/web"

[deploy]
startCommand = "node apps/web/.output/server/index.mjs"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
