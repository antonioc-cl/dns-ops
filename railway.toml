# Railway deployment configuration — collector service
# Uses Railpack (Railway's builder) which auto-detects bun from bun.lock
#
# Railpack handles: bun install, workspace resolution, build, start
# See also: railpack.json for fine-grained build config (if needed)
#
# Railway provisions Postgres via plugin. Link DATABASE_URL as:
#   ${{Postgres.DATABASE_URL}}

[build]
# Build collector + all workspace dependencies via turbo
buildCommand = "bun install --frozen-lockfile && bun run build --filter=@dns-ops/collector..."

[deploy]
# Start the collector service
startCommand = "node apps/collector/dist/index.js"
# Health check — collector responds at /healthz
healthcheckPath = "/healthz"
healthcheckTimeout = 10
# Graceful shutdown — collector handles SIGTERM
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
