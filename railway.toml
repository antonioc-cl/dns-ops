# Railway deployment configuration for DNS Ops monorepo
# Both services run from repo root and use RAILWAY_SERVICE_NAME to select start command

[build]
buildCommand = "bun install && bun run build --filter=@dns-ops/web"

[deploy]
startCommand = "node start.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
